version: "3.8"
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./frontend:/app/frontend
    environment:
      - MODEL_PATH=/app/models/rf_model.joblib
      - ALLOWED_ORIGINS=*

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - BACKEND_URL=http://backend:8000
      - CSV_PATH=/app/frontend/coinryze_history.csv
      - S3_BASE_URL=

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    volumes:
      - ./frontend:/app/frontend
      - ./models:/app/models
    environment:
      - COINRYZE_URL=https://coinryze.org
      - CSV_PATH=/app/frontend/coinryze_history.csv
      - PARQUET_PATH=/app/frontend/coinryze_history.parquet
      - FETCH_INTERVAL_MIN=1
