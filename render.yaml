services:
  - type: web
    name: coinryze-dashboard
    env: docker
    dockerfilePath: ./Dockerfile.streamlit
    plan: free
    autoDeploy: true
    envVars:
      - key: BACKEND_URL
        value: https://coinryze-backend.onrender.com
      - key: S3_BASE_URL
        value: ""  # Optional, set to your S3 public URL if used
      - key: CSV_PATH
        value: /app/frontend/coinryze_history.csv
