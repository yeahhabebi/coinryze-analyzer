services:
  # === Streamlit Frontend ===
  - type: web
    name: coinryze-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

  # === FastAPI Backend ===
  - type: web
    name: coinryze-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MODEL_PATH
        value: models/rf_model.joblib

  # === Worker (Data Collector) ===
  - type: worker
    name: coinryze-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./render-worker.sh
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FETCH_INTERVAL
        value: "60"   # seconds between fetches
      - key: DATA_PATH
        value: frontend/coinryze_history.csv
